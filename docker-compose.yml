services:
  orbit:
    build: .
    volumes:
      - .:/workspace
      - orbit-claude-config:/home/orbit/.claude
    env_file:
      - .env
    ports:
      - "8777:8777"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

volumes:
  orbit-claude-config:
