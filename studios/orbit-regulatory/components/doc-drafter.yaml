component: doc-drafter
prompt: prompts/doc-drafter.md

preflight:
  - scripts/extract-req-section.sh
  - scripts/extract-risk-controls.sh
  - scripts/build-trace-excerpt.sh

delivers:
  - regulatory-docs/

success:
  when: bash
  condition: |
    jq -e '[.tasks[] | select(.done == false)] | length == 0' \
      .orbit/plans/regulatory/tasks.json

orbits:
  max: 150
  deadlock_threshold: 5

perspective: |
  You are stuck drafting a regulatory document section. Try:
  - Re-read the extracted requirements and risk controls from the preflight output
  - Check if the section has already been partially written
  - Verify you are working on the correct task from tasks.json
  - Ensure the trace excerpt covers the requirements for this section
