mission: generate-docs
status: active

stages:
  - name: gather
    component: traceability-generator
    waypoint: true

  - name: decompose
    component: doc-task-decomposer
    depends_on: [gather]
    waypoint: true

  - name: draft
    component: doc-drafter
    depends_on: [decompose]
    orbits_to: decompose
    max_orbits: 150

    orbit_exit:
      when: bash
      condition: |
        jq -e '[.tasks[] | select(.done == false)] | length == 0' \
          .orbit/plans/regulatory/tasks.json

  - name: review-gate
    type: manual
    prompt: |
      Regulatory document drafts ready for qualified-person review.
      Approve to finalise, reject to halt, iterate to return to drafting.
    options: [approve, reject, iterate]
    timeout: 120h
    default: reject
    depends_on: [draft]
