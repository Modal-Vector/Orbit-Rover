component: researcher
agent: claude-code
model: sonnet
prompt: components/researcher/researcher.md

preflight:
  - scripts/distil-sources.sh
  - scripts/extract-findings.sh

delivers:
  - findings/

orbits:
  max: 200
  success:
    when: bash
    condition: |
      jq -e '[.tasks[] | select(.done == false)] | length == 0' \
        {mission.run_dir}/plans/research/tasks.json
  deadlock:
    threshold: 5
