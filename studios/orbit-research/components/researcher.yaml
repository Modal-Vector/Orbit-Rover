component: researcher
prompt: prompts/researcher.md

preflight:
  - scripts/distil-sources.sh
  - scripts/extract-findings.sh

delivers:
  - findings/

orbits:
  max: 200
  deadlock_threshold: 5
  success:
    when: bash
    condition: |
      jq -e '[.tasks[] | select(.done == false)] | length == 0' \
        .orbit/plans/research/tasks.json

perspective: |
  You are stuck researching. Try:
  - Check if distilled source material exists at sources/{task-id}/distilled.md
  - If sources are unavailable, synthesise from what you know and mark done
  - Verify you are working on the correct task from tasks.json
  - Review prior findings in findings/ for context
