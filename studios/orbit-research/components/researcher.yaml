component: researcher
prompt: prompts/researcher.md

preflight:
  - scripts/distil-sources.sh
  - scripts/extract-findings.sh

delivers:
  - findings/

orbits:
  max: 200
  deadlock:
    threshold: 5
  success:
    when: bash
    condition: |
      jq -e '[.tasks[] | select(.done == false)] | length == 0' \
        .orbit/plans/research/tasks.json
