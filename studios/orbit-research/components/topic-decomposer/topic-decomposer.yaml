component: topic-decomposer
prompt: components/topic-decomposer/topic-decomposer.md

delivers:
  - "{mission.run_dir}/plans/research/atomic/"

orbits:
  max: 5
  success:
    when: bash
    condition: |
      test -d {mission.run_dir}/plans/research/atomic && \
      find {mission.run_dir}/plans/research/atomic -name '*.json' | head -1 | grep -q .
