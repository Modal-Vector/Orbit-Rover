component: section-writer
prompt: components/section-writer/section-writer.md

delivers:
  - output/

orbits:
  max: 50
  deadlock:
    threshold: 5
  success:
    when: bash
    condition: |
      jq -e '[.tasks[] | select(.done == false)] | length == 0' \
        {mission.run_dir}/plans/research/write-tasks.json
