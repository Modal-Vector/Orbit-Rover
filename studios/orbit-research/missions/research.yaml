mission: research
status: active

sensors:
  schedule:
    cron: "0 8 * * 1"

stages:
  - name: decompose
    component: topic-decomposer
    waypoint: true

  - name: investigate
    component: researcher
    depends_on: [decompose]
    orbits_to: decompose
    max_orbits: 200

    orbit_exit:
      when: bash
      condition: |
        jq -e '[.tasks[] | select(.done == false)] | length == 0' \
          {mission.run_dir}/plans/research/tasks.json
