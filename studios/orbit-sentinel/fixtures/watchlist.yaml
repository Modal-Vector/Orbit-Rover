    priority: low
    tags: [open-source, trends]

  - name: "NIST Cybersecurity Advisories"
    url: "https://nvd.nist.gov/feeds/xml/cve/misc/nvd-rss.xml"
    type: rss
    priority: high
    tags: [security, advisories]
