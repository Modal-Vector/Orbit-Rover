component: remediator
prompt: prompts/remediator.md

postflight:
  - scripts/validate-fix.sh

tools:
  assigned:
    - notify-operator
    - check-health
    - restart-service
    - apply-config-patch
  policy: restricted

delivers:
  - .orbit/plans/fieldops/tasks.json

orbits:
  max: 20
  deadlock:
    threshold: 3
  success:
    when: bash
    condition: |
      jq -e '[.tasks[] | select(.done == false)] | length == 0' \
        .orbit/plans/fieldops/tasks.json
